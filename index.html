const MESES=["Todos","Jan","Fev","Mar","Abr","Mai"];
const MES_FULL={Jan:"Janeiro",Fev:"Fevereiro",Mar:"Março",Abr:"Abril",Mai:"Maio"};
const NAV=[
  {id:"visao",label:"Visão Geral"},
  {id:"chamados",label:"Chamados"},
  {id:"modelos",label:"Modelos"},
  {id:"sintomas",label:"Sintomas"},
  {id:"desligamentos",label:"Desligamentos"},
  {id:"trocas",label:"Trocas de Equipamentos"},
  {id:"custos",label:"Custos Operacionais"},
  {id:"atencao",label:"Pontos de Atenção"},
];

const fmt=v=>v?.toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})??"-";
const fmtR=v=>v!=null?`R$ ${v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`:"-";
const fmtPct=v=>v!=null?`${(v*100).toFixed(1)}%`:"-";

function HBar({value,max,color,label,valueLabel,height=18,labelWidth=28}){
  const pct=Math.min((value/max)*100,100);
  return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
    React.createElement("span",{style:{width:labelWidth,fontSize:12,color:"var(--text-muted)",fontWeight:600,flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},label),
    React.createElement("div",{style:{flex:1,height,background:"var(--bar-bg)",borderRadius:height/2,overflow:"hidden"}},
      React.createElement("div",{style:{height:"100%",width:`${pct}%`,background:color,borderRadius:height/2,transition:"width 0.4s ease"}})
    ),
    React.createElement("span",{style:{width:42,fontSize:12,color:"var(--text-primary)",fontWeight:600,textAlign:"right",flexShrink:0}},valueLabel)
  );
}

function KpiCard({label,value,sub,color="#5b7cf5"}){
  return React.createElement("div",{style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:12,padding:"16px 20px",flex:"1 1 160px"}},
    React.createElement("p",{style:{fontSize:12,color:"var(--text-muted)",margin:"0 0 6px"}},label),
    React.createElement("p",{style:{fontSize:26,fontWeight:700,color,margin:0}},value),
    sub&&React.createElement("p",{style:{fontSize:11,color:"var(--text-muted)",marginTop:4}},sub)
  );
}

function SectionTitle({children}){
  return React.createElement("h3",{style:{fontSize:13,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text-muted)",margin:"0 0 14px"}},children);
}

function ChamadosTable({data}){
  return React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},
    React.createElement("thead",null,
      React.createElement("tr",{style:{borderBottom:"2px solid var(--card-border)"}},
        ["Mês","Chamados","Atendidos","% Atend.","No SLA","% SLA"].map(h=>
          React.createElement("th",{key:h,style:{padding:"8px 10px",textAlign:"left",color:"var(--text-muted)",fontWeight:600,fontSize:11,textTransform:"uppercase"}},h)
        )
      )
    ),
    React.createElement("tbody",null,
      data.map((row,i)=>
        React.createElement("tr",{key:i,style:{borderBottom:"1px solid var(--card-border)"}},
          React.createElement("td",{style:{padding:"9px 10px",fontWeight:600,color:"var(--text-primary)"}},MES_FULL[row.mes]||row.mes),
          React.createElement("td",{style:{padding:"9px 10px",color:"var(--text-primary)"}},fmt(row.chamados)),
          React.createElement("td",{style:{padding:"9px 10px",color:"var(--text-primary)"}},fmt(row.atendidos)),
          React.createElement("td",{style:{padding:"9px 10px",color:"var(--text-primary)"}},fmtPct(row.percAtendidos)),
          React.createElement("td",{style:{padding:"9px 10px",color:"var(--text-primary)"}},fmt(row.noSLA)),
          React.createElement("td",{style:{padding:"9px 10px"}},
            React.createElement("span",{style:{background:row.percSLA>=0.8?"#dcfce7":row.percSLA>=0.7?"#fff7ed":"#fef2f2",color:row.percSLA>=0.8?"#15803d":row.percSLA>=0.7?"#c2410c":"#b91c1c",padding:"2px 8px",borderRadius:4,fontSize:12,fontWeight:600}},fmtPct(row.percSLA))
          )
        )
      )
    )
  );
}

function TabChamados({mesFiltro}){
  const allData=mockData.chamados;
  const data=mesFiltro==="Todos"?allData:allData.filter(c=>c.mes===mesFiltro);
  const maxC=Math.max(...allData.map(c=>c.chamados));
  const maxA=Math.max(...allData.map(c=>c.atendidos));
  if(mesFiltro==="Todos"){
    return React.createElement("div",null,
      React.createElement("div",{style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"20px 24px",marginBottom:24}},
        React.createElement("div",{style:{borderBottom:"1px solid var(--card-border)",paddingBottom:20,marginBottom:20}},
          React.createElement("p",{style:{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}},"TOTAL DE CHAMADOS"),
          data.map(c=>React.createElement(HBar,{key:c.mes,label:c.mes,value:c.chamados,max:maxC,color:"#5b7cf5",valueLabel:String(c.chamados),height:20}))
        ),
        React.createElement("div",{style:{borderBottom:"1px solid var(--card-border)",paddingBottom:20,marginBottom:20}},
          React.createElement("p",{style:{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}},"ATENDIDOS NO MÊS"),
          data.map(c=>React.createElement(HBar,{key:c.mes,label:c.mes,value:c.atendidos,max:maxA,color:"#22c55e",valueLabel:String(c.atendidos),height:20}))
        ),
        React.createElement("div",null,
          React.createElement("p",{style:{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}},"SLA CUMPRIDO (%)"),
          data.map(c=>React.createElement(HBar,{key:c.mes,label:c.mes,value:c.percSLA*100,max:100,color:c.percSLA>=0.8?"#22c55e":c.percSLA>=0.7?"#f97316":"#ef4444",valueLabel:`${Math.round(c.percSLA*100)}%`,height:20}))
        )
      ),
      React.createElement(ChamadosTable,{data})
    );
  }
  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",gap:12,flexWrap:"wrap",marginBottom:24}},
      data.map((row,i)=>[
        React.createElement(KpiCard,{key:`ch${i}`,label:"Chamados",value:fmt(row.chamados),color:"#5b7cf5"}),
        React.createElement(KpiCard,{key:`at${i}`,label:"Atendidos",value:fmt(row.atendidos),sub:fmtPct(row.percAtendidos),color:"#22c55e"}),
        React.createElement(KpiCard,{key:`sl${i}`,label:"SLA",value:fmtPct(row.percSLA),color:row.percSLA>=0.8?"#22c55e":row.percSLA>=0.7?"#f97316":"#ef4444"}),
        React.createElement(KpiCard,{key:`ns${i}`,label:"No SLA",value:fmt(row.noSLA),color:"#8b5cf6"}),
      ])
    ),
    React.createElement(ChamadosTable,{data})
  );
}

function TabModelos({mesFiltro}){
  const colors=["#5b7cf5","#f97316","#22c55e","#8b5cf6","#ef4444"];
  const meses=mesFiltro==="Todos"?Object.keys(mockData.modelos):[mesFiltro];
  if(mesFiltro==="Todos"){
    const modelTotals={};
    meses.forEach(m=>{mockData.modelos[m]?.forEach(r=>{modelTotals[r.modelo]=(modelTotals[r.modelo]||0)+r.qtd;});});
    const maxTotal=Math.max(...Object.values(modelTotals));
    const allModelos=["S9","S8","I2","S10","BR8"];
    return React.createElement("div",null,
      React.createElement("div",{style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"20px 24px",marginBottom:24}},
        React.createElement("p",{style:{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:16}},"ACUMULADO JAN–MAI"),
        allModelos.map((m,i)=>React.createElement(HBar,{key:m,label:m,value:modelTotals[m]||0,max:maxTotal,color:colors[i],valueLabel:String(modelTotals[m]||0),height:22}))
      ),
      meses.map(m=>{
        const rows=mockData.modelos[m]||[];
        const maxQ=Math.max(...rows.map(r=>r.qtd));
        return React.createElement("div",{key:m,style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"18px 22px",marginBottom:16}},
          React.createElement("p",{style:{fontWeight:700,fontSize:13,color:"var(--text-primary)",marginBottom:12}},`${MES_FULL[m]} — Top 5 Modelos`),
          rows.map((r,i)=>React.createElement(HBar,{key:i,label:r.modelo,value:r.qtd,max:maxQ,color:colors[i],valueLabel:`${r.qtd} (${r.perc}%)`,height:18}))
        );
      })
    );
  }
  const rows=mockData.modelos[mesFiltro]||[];
  const maxQ=Math.max(...rows.map(r=>r.qtd));
  return React.createElement("div",{style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"20px 24px"}},
    React.createElement("p",{style:{fontWeight:700,fontSize:14,color:"var(--text-primary)",marginBottom:16}},`${MES_FULL[mesFiltro]} — Top 5 Modelos`),
    rows.map((r,i)=>React.createElement(HBar,{key:i,label:r.modelo,value:r.qtd,max:maxQ,color:colors[i],valueLabel:`${r.qtd} (${r.perc}%)`,height:22}))
  );
}

function TabSintomas({mesFiltro}){
  const colors=["#5b7cf5","#f97316","#22c55e","#8b5cf6","#ef4444"];
  const meses=mesFiltro==="Todos"?Object.keys(mockData.sintomas):[mesFiltro];
  if(mesFiltro==="Todos"){
    const map={};
    meses.forEach(m=>{mockData.sintomas[m]?.forEach(s=>{map[s.sintoma]=(map[s.sintoma]||0)+s.qtd;});});
    const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxVal=Math.max(...sorted.map(([,v])=>v));
    const maxLen=Math.max(...sorted.map(([s])=>s.length));
    const lw=Math.min(Math.max(maxLen*7,40),200);
    return React.createElement("div",null,
      React.createElement("div",{style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"20px 24px",marginBottom:24}},
        React.createElement("p",{style:{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:16}},"ACUMULADO JAN–MAI"),
        sorted.map(([s,v],i)=>React.createElement(HBar,{key:s,label:s,value:v,max:maxVal,color:colors[i%colors.length],valueLabel:String(v),height:20,labelWidth:lw}))
      ),
      meses.map(m=>{
        const rows=mockData.sintomas[m]||[];
        const mq=Math.max(...rows.map(r=>r.qtd));
        const ml=Math.max(...rows.map(r=>r.sintoma.length));
        const mlw=Math.min(Math.max(ml*7,40),200);
        return React.createElement("div",{key:m,style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"18px 22px",marginBottom:16}},
          React.createElement("p",{style:{fontWeight:700,fontSize:13,color:"var(--text-primary)",marginBottom:12}},`${MES_FULL[m]} — Top 5 Sintomas`),
          rows.map((r,i)=>React.createElement(HBar,{key:i,label:r.sintoma,value:r.qtd,max:mq,color:colors[i],valueLabel:`${r.qtd} (${r.perc}%)`,height:18,labelWidth:mlw}))
        );
      })
    );
  }
  const rows=mockData.sintomas[mesFiltro]||[];
  const mq=Math.max(...rows.map(r=>r.qtd));
  const ml=Math.max(...rows.map(r=>r.sintoma.length));
  const mlw=Math.min(Math.max(ml*7,40),200);
  return React.createElement("div",{style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"20px 24px"}},
    React.createElement("p",{style:{fontWeight:700,fontSize:14,color:"var(--text-primary)",marginBottom:16}},`${MES_FULL[mesFiltro]} — Top 5 Sintomas`),
    rows.map((r,i)=>React.createElement(HBar,{key:i,label:r.sintoma,value:r.qtd,max:mq,color:colors[i],valueLabel:`${r.qtd} (${r.perc}%)`,height:22,labelWidth:mlw}))
  );
}

function TabDesligamentos({mesFiltro}){
  const allData=mockData.desligamentos;
  const data=mesFiltro==="Todos"?allData:allData.filter(d=>d.mes===mesFiltro);
  const maxD=Math.max(...allData.map(d=>d.desligamentos));
  const percDosC=d=>{const c=mockData.chamados.find(c=>c.mes===d.mes);return c?d.desligamentos/c.chamados:0;};
  const maxP=Math.max(...allData.map(d=>percDosC(d)*100));
  if(mesFiltro==="Todos"){
    return React.createElement("div",null,
      React.createElement("div",{style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"20px 24px",marginBottom:24}},
        React.createElement("div",{style:{borderBottom:"1px solid var(--card-border)",paddingBottom:20,marginBottom:20}},
          React.createElement("p",{style:{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}},"DESLIGAMENTOS POR MÊS"),
          data.map(d=>React.createElement(HBar,{key:d.mes,label:d.mes,value:d.desligamentos,max:maxD,color:"#ef4444",valueLabel:String(d.desligamentos),height:20}))
        ),
        React.createElement("p",{style:{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}},"% DOS CHAMADOS"),
        data.map(d=>React.createElement(HBar,{key:d.mes,label:d.mes,value:percDosC(d)*100,max:maxP,color:"#f97316",valueLabel:fmtPct(percDosC(d)),height:20}))
      ),
      React.createElement("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
        data.map((d,i)=>React.createElement(KpiCard,{key:i,label:MES_FULL[d.mes]||d.mes,value:fmt(d.desligamentos),sub:`${fmtPct(percDosC(d))} dos chamados`,color:"#ef4444"}))
      )
    );
  }
  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",gap:12,flexWrap:"wrap",marginBottom:28}},
      data.map((d,i)=>React.createElement(KpiCard,{key:i,label:MES_FULL[d.mes]||d.mes,value:fmt(d.desligamentos),sub:`${fmtPct(percDosC(d))} dos chamados`,color:"#ef4444"}))
    ),
    React.createElement("div",{style:{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,padding:"20px 24px"}},
      React.createElement("p",{style:{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:16}},"HISTÓRICO JAN–MAI"),
      React.createElement("div",{style:{borderBottom:"1px solid var(--card-border)",paddingBottom:20,marginBottom:20}},
        allData.map(d=>React.createElement(HBar,{key:d.mes,label:d.mes,value:d.desligamentos,max:maxD,color:d.mes===mesFiltro?"#ef4444":"#f97316",valueLabel:String(d.desligamentos),height:20}))
      ),
      allData.map(d=>React.createElement(HBar,{key:d.mes,label:d.mes,value:percDosC(d)*100,max:maxP,color:d.mes===mesFiltro?"#ef4444":"#f97316",valueLabel:fmtPct(percDosC(d)),height:20}))
    )
  );
}

  const allData=mockData.substituicoes;
  const data=mesFiltro==="Todos"?allData:allData.filter(d=>d.mes===mesFiltro);
  const maxT=Math.max(...allData.map(s=>s.trocas));
  const maxP=Math.max(...allData.map(s=>s.perc*100));
  if(mesFiltro==="Todos"){
    return React.createElement("div",null,
