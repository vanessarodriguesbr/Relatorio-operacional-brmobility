<!DOCTYPE html>
<html lang="pt-BR">

<title>BRMobility - Dashboard Operacional</title>
<!-- Firebase SDK (compat, funciona sem build/módulos) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: 'Inter', -apple-system, sans-serif; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius:3px; }
  .app { display:flex; height:100vh; background:var(--bg); }
  .sidebar { width:240px; background:var(--sidebar-bg); border-right:1px solid var(--card-border); display:flex; flex-direction:column; flex-shrink:0; }
  .sidebar-header { padding:20px 18px 16px; border-bottom:1px solid var(--card-border); display:flex; align-items:center; gap:10px; }

  .brand-sub { font-size:10px; color:var(--text-muted); }
  nav { flex:1; padding:10px; overflow-y:auto; }
  .nav-btn { width:100%; display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; border:none; cursor:pointer; background:transparent; color:var(--text-muted); font-size:13px; margin-bottom:2px; text-align:left; }
  .nav-btn.active { background:var(--nav-active); color:#4f63f7; font-weight:600; }
  .nav-btn .ic { width:16px; text-align:center; flex-shrink:0; }

  .sidebar-footer { padding:14px 12px; border-top:1px solid var(--card-border); }
  .theme-btn { width:100%; display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-radius:8px; border:1px solid var(--card-border); background:var(--filter-bg); cursor:pointer; color:var(--text-primary); font-size:12px; }
  .toggle-track { width:32px; height:18px; border-radius:9px; position:relative; transition:background .2s; }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .header { background:var(--header-bg); border-bottom:1px solid var(--card-border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; flex-wrap:wrap; gap:10px; }

  .filters { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }

  .content { flex:1; overflow-y:auto; padding:24px 28px; }
  .card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:14px; padding:20px 24px; margin-bottom:24px; }
  .section-title { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin:0 0 14px; }
  .block-label { font-size:11px; font-weight:700; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; }
  .block-divider { border-bottom:1px solid var(--card-border); padding-bottom:20px; margin-bottom:20px; }
  .hbar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .hbar-label { font-size:12px; color:var(--text-muted); font-weight:600; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hbar-track { flex:1; background:var(--bar-bg); border-radius:20px; overflow:hidden; position:relative; }
  .hbar-fill { height:100%; border-radius:20px; transition:width .4s ease; position:relative; }
  .hbar-dot { position:absolute; right:4px; top:50%; transform:translateY(-50%); width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.6); }
  .hbar-value { width:46px; font-size:12px; color:var(--text-primary); font-weight:600; text-align:right; flex-shrink:0; }
  .kpi-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px; }

  .mini-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px; }
  .mini-card { flex:1 1 200px; background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; padding:14px 16px; }
  .mini-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; margin:0 0 10px; display:flex; align-items:center; gap:6px; }
  .mini-chart-wrap { height:160px; position:relative; }

  .insight-box { border-radius:12px; padding:16px 18px; }
  .insight-title { font-weight:700; font-size:13px; margin:0 0 10px; display:flex; align-items:center; gap:6px; }
  .insight-item { font-size:12px; margin:4px 0; padding-left:14px; position:relative; }

  .diag-item { border-left:3px solid #5b7cf5; padding-left:14px; margin-bottom:16px; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { padding:8px 10px; text-align:left; color:var(--text-muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; border-bottom:2px solid var(--card-border); }
  td { padding:9px 10px; color:var(--text-primary); border-bottom:1px solid var(--card-border); }
  .badge { padding:2px 8px; border-radius:4px; font-size:12px; font-weight:600; }
  .rank-num { width:24px; height:24px; border-radius:6px; color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  .rank-bar-track { height:6px; background:var(--bar-bg); border-radius:4px; overflow:hidden; margin-top:3px; }

  .risk-ref { font-weight:700; font-size:13px; margin:0 0 6px; display:flex; align-items:center; gap:6px; }

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

  /* LOGIN */
  .login-wrap { height:100vh; display:flex; align-items:center; justify-content:center; background:#0f1117; font-family:'Inter',-apple-system,sans-serif; }
  .login-box { width:100%; max-width:360px; background:#1e2130; border:1px solid #2e3250; border-radius:16px; padding:32px 28px; }
  .login-logo { width:44px; height:44px; border-radius:10px; background:#4f63f7; display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px; margin:0 auto 16px; }
  .login-title { text-align:center; font-size:16px; font-weight:700; color:#f1f5f9; margin-bottom:4px; }
  .login-sub { text-align:center; font-size:12px; color:#8890aa; margin-bottom:24px; }
  .login-field { margin-bottom:14px; }
  .login-field label { display:block; font-size:12px; color:#8890aa; margin-bottom:6px; }
  .login-field input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #2e3250; background:#0f1117; color:#f1f5f9; font-size:13px; outline:none; }
  .login-field input:focus { border-color:#4f63f7; }
  .login-btn { width:100%; padding:11px; border-radius:8px; border:none; background:#4f63f7; color:#fff; font-size:13px; font-weight:600; cursor:pointer; margin-top:6px; }
  .login-btn:disabled { opacity:0.6; cursor:not-allowed; }
  .login-error { font-size:12px; color:#ef4444; margin-top:10px; text-align:center; min-height:14px; }
  .logout-btn { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:8px; border:1px solid var(--card-border); background:var(--filter-bg); cursor:pointer; color:var(--text-primary); font-size:12px; width:100%; margin-top:8px; }
</style>

const MESES = ["Todos","Jan","Fev","Mar","Abr","Mai"];
const MES_FULL = { Jan:"Janeiro",Fev:"Fevereiro",Mar:"Março",Abr:"Abril",Mai:"Maio" };

const NAV = [
  { id:"visao", label:"Visão Geral", icon:"🏠" },
  { id:"chamados", label:"Chamados", icon:"📞" },
  { id:"modelos", label:"Modelos", icon:"⚡" },
  { id:"sintomas", label:"Sintomas", icon:"🔧" },
  { id:"desligamentos", label:"Desligamentos", icon:"🔌" },

  { id:"custos", label:"Custos Operacionais", icon:"💲" },
  { id:"atencao", label:"Pontos de Atenção", icon:"⚠️" },
];

// ─────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────
const fmt = v => (v==null?"-":v.toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0}));
const fmtR = v => (v==null?"-":`R$ ${v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`);
const fmtPct = v => (v==null?"-":`${(v*100).toFixed(1)}%`);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let state = { aba: "visao", mes: "Todos", dark: true };

// ─────────────────────────────────────────────────────────────────────────
// FIREBASE — substitua pelos valores do SEU projeto (Firebase Console >
// Configurações do Projeto > Geral > Seus apps > SDK setup and configuration)
// ─────────────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};

let db = null;
let auth = null;
const ALLOWED_EMAIL = "vanessa@brmobility.com"; // único e-mail autorizado a editar dados

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  auth = firebase.auth();
} catch (e) {
  console.warn("Firebase não inicializado (verifique firebaseConfig):", e);
}

// ─────────────────────────────────────────────────────────────────────────
// LOGIN / AUTENTICAÇÃO
// ─────────────────────────────────────────────────────────────────────────
function renderLogin(errorMsg) {
  document.getElementById('root').innerHTML = `
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-logo">⚡</div>
        <p class="login-title">BRMobility — Acesso Restrito</p>
        <p class="login-sub">Entre com seu e-mail e senha para continuar</p>
        <form id="loginForm">
          <div class="login-field">
            <label>E-mail</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com" required autocomplete="username" />
          </div>
          <div class="login-field">
            <label>Senha</label>
            <input type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <button type="submit" class="login-btn" id="loginBtn">Entrar</button>
          <p class="login-error" id="loginError">${errorMsg ? esc(errorMsg) : ""}</p>
        </form>
      </div>
    </div>`;

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    btn.disabled = true; btn.textContent = "Entrando...";
    errEl.textContent = "";
    if (!auth) {
      errEl.textContent = "Firebase Authentication não configurado.";
      btn.disabled = false; btn.textContent = "Entrar";
      return;
    }
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      // onAuthStateChanged vai assumir o redirecionamento para o dashboard
    } catch (err) {
      errEl.textContent = "E-mail ou senha incorretos.";
      btn.disabled = false; btn.textContent = "Entrar";
    }
  });
}

function setupAuthGate() {
  if (!auth) {
    // Sem Firebase Auth configurado — não bloqueia, mas avisa no console
    console.warn("Firebase Auth não configurado — dashboard ficará acessível sem login.");
    setupAuthGate();
    return;
  }
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      loadDataAndRender();
    } else {
      currentUser = null;
      renderLogin();
    }
  });
}

let currentUser = null;
function isEditor() {
  return currentUser && currentUser.email && currentUser.email.toLowerCase() === ALLOWED_EMAIL;
}

window.logout = function() {
  if (auth) auth.signOut();
};

// Busca os dados em /dashboard/data. Se não existir ou der erro,
// mantém os dados locais (mockData) já definidos acima como fallback.
async function loadDataAndRender() {
  if (db) {
    try {
      const doc = await db.collection("dashboard").doc("data").get();
      if (doc.exists) {
        const remote = doc.data();
        // Mescla campo a campo, preservando estrutura caso algum campo não exista ainda no Firestore
        mockData = {
          chamados: remote.chamados || mockData.chamados,
          modelos: remote.modelos || mockData.modelos,
          sintomas: remote.sintomas || mockData.sintomas,
          desligamentos: remote.desligamentos || mockData.desligamentos,
          substituicoes: remote.substituicoes || mockData.substituicoes,
          custos: remote.custos || mockData.custos,
        };
      } else {
        console.info("Documento dashboard/data não encontrado — usando dados locais. Use saveDataToFirebase() no console para enviar os dados atuais.");
      }
    } catch (e) {
      console.warn("Erro ao buscar dados do Firestore — usando dados locais:", e);
    }
  }
  loadDataAndRender();}

// Função utilitária: roda no console do navegador para enviar o mockData
// atual (local) para o Firestore pela primeira vez (seed inicial).
window.saveDataToFirebase = async function() {
  if (!db) { console.error("Firebase não inicializado."); return; }
  if (!isEditor()) { console.error("Apenas " + ALLOWED_EMAIL + " pode salvar alterações."); return; }
  try {
    await db.collection("dashboard").doc("data").set(mockData);
    console.info("Dados enviados ao Firestore com sucesso.");
  } catch (e) {
    console.error("Erro ao salvar no Firestore:", e);
  }
};

function applyTheme() {
  const dark = state.dark;
  const theme = dark ? {
    "--bg":"#0f1117","--sidebar-bg":"#1a1d27","--card-bg":"#1e2130","--card-border":"#2e3250",
    "--text-primary":"#f1f5f9","--text-muted":"#8890aa","--chart-grid":"#2e3250","--bar-bg":"#2e3250",
    "--tt-bg":"#1e2130","--tt-border":"#2e3250","--tt-text":"#f1f5f9",
    "--header-bg":"#1a1d27","--nav-hover":"#252a3a","--nav-active":"#252a3a","--filter-bg":"#1e2130",
  } : {
    "--bg":"#f8f9fc","--sidebar-bg":"#ffffff","--card-bg":"#ffffff","--card-border":"#e8eaf2",
    "--text-primary":"#1a1d2e","--text-muted":"#6b7280","--chart-grid":"#f1f3f9","--bar-bg":"#f1f3f9",
    "--tt-bg":"#ffffff","--tt-border":"#e8eaf2","--tt-text":"#1a1d2e",
    "--header-bg":"#ffffff","--nav-hover":"#f0f2fc","--nav-active":"#eef0fc","--filter-bg":"#f0f2fc",
  };
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v]) => root.style.setProperty(k,v));
}

// ─────────────────────────────────────────────────────────────────────────
// HBAR
// ─────────────────────────────────────────────────────────────────────────
function hbar({ value, max, color, label, valueLabel, height=18, labelWidth=28 }) {
  const pct = Math.min((value/max)*100, 100);
  return `<div class="hbar-row">
    <span class="hbar-label" style="width:${labelWidth}px">${esc(label)}</span>
    <div class="hbar-track" style="height:${height}px">
      <div class="hbar-fill" style="width:${pct}%;height:100%;background:${color}">
        <div class="hbar-dot"></div>
      </div>
    </div>
    <span class="hbar-value">${esc(valueLabel)}</span>
  </div>`;
}

function autoLabelWidth(labels) {
  const maxLen = Math.max(...labels.map(l => l.length));
  return Math.min(Math.max(maxLen*7, 40), 200);
}

function kpiCard({ label, value, sub, color="#5b7cf5" }) {
  return `<div class="kpi-card">
    <p class="kpi-label">${esc(label)}</p>
    <p class="kpi-value" style="color:${color}">${value}</p>
    ${sub?`<p class="kpi-sub">${esc(sub)}</p>`:""}
  </div>`;
}

function sectionTitle(txt) { return `<h3 class="section-title">${esc(txt)}</h3>`; }

// ─────────────────────────────────────────────────────────────────────────
// MINI AREA CHART (SVG) — substitui recharts
// ─────────────────────────────────────────────────────────────────────────
function miniAreaCard({ title, icon, color, dataKey, formatValue, getTooltipExtra, idSuffix }) {
  const data = mockData.chamados.map((c,i) => ({
    mes: c.mes,
    val: mockData.custos[i][dataKey] !== undefined ? mockData.custos[i][dataKey] : mockData.chamados[i].noSLA
  }));
  const W = 280, H = 150, PAD = 24;
  const maxV = Math.max(...data.map(d=>d.val), 1);
  const minV = 0;
  const stepX = (W - PAD*1.2) / (data.length - 1);
  const pts = data.map((d,i) => {
    const x = PAD*0.6 + i*stepX;
    const y = H - 20 - ((d.val - minV)/(maxV-minV || 1)) * (H - 40);
    return { x, y, ...d };
  });
  const linePath = pts.map((p,i) => (i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
  const areaPath = `${linePath} L${pts[pts.length-1].x},${H-20} L${pts[0].x},${H-20} Z`;
  const gradId = `grad-${idSuffix}`;

  const circles = pts.map((p,i) => `<circle data-idx="${i}" data-chart="${idSuffix}" cx="${p.x}" cy="${p.y}" r="5" fill="${color}" fill-opacity="0" stroke="none" style="cursor:pointer"></circle>
    <circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${color}"></circle>`).join("");

  const xLabels = pts.map(p => `<text x="${p.x}" y="${H-4}" font-size="11" fill="var(--text-muted)" text-anchor="middle">${p.mes}</text>`).join("");

  return `<div class="mini-card" data-tooltip-host="${idSuffix}" style="position:relative">
    <p class="mini-title" style="color:${color}"><span style="font-size:14px">${icon}</span>${esc(title)}</p>
    <div class="mini-chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" style="overflow:visible">
        <defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%" stop-color="${color}" stop-opacity="0.3"/>
            <stop offset="95%" stop-color="${color}" stop-opacity="0.03"/>
          </linearGradient>
        </defs>
        ${[0,1,2,3].map(i => `<line x1="${PAD*0.6}" y1="${20+i*(H-40)/3}" x2="${W-PAD*0.6}" y2="${20+i*(H-40)/3}" stroke="var(--chart-grid)" stroke-dasharray="3 3"/>`).join("")}
        <path d="${areaPath}" fill="url(#${gradId})"></path>
        <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2"></path>
        ${circles}
        ${xLabels}
      </svg>
    </div>
  </div>`;
}

function wireMiniChartTooltips(formatValueFns) {
  document.querySelectorAll('circle[data-chart]').forEach(circle => {
    const chartId = circle.getAttribute('data-chart');
    const idx = parseInt(circle.getAttribute('data-idx'),10);
    circle.addEventListener('mouseenter', (e) => {
      const host = document.querySelector(`[data-tooltip-host="${chartId}"]`);
      if (!host) return;
      const mesKey = mockData.chamados[idx].mes;
      const dataKeyInfo = formatValueFns[chartId];
      const val = dataKeyInfo.getValue(idx);
      const sintoma = mockData.sintomas[mesKey]?.[0]?.sintoma ?? "-";
      const modelo = mockData.modelos[mesKey]?.[0]?.modelo ?? "-";
      const chamadosV = mockData.chamados[idx]?.chamados;
      const trocasV = mockData.substituicoes[idx]?.trocas;
      let tip = host.querySelector('.tooltip-box');
      if (!tip) {
        tip = document.createElement('div');
        tip.className = 'tooltip-box';
        host.appendChild(tip);
      }
      tip.innerHTML = `<p style="font-weight:700;margin-bottom:4px">${mesKey}</p>
        <p style="color:${dataKeyInfo.color}">${dataKeyInfo.formatValue(val)}</p>
        <p style="color:var(--text-muted);font-size:11px">⚡ Sintoma: <b>${esc(sintoma)}</b></p>
        <p style="color:var(--text-muted);font-size:11px">🚲 Modelo: <b>${esc(modelo)}</b></p>
        <p style="color:var(--text-muted);font-size:11px">Chamados: <b>${chamadosV}</b></p>
        <p style="color:var(--text-muted);font-size:11px">Trocas: <b>${trocasV}</b></p>`;
      tip.style.display = 'block';
      tip.style.left = '10px';
      tip.style.top = '36px';
    });
    circle.addEventListener('mouseleave', (e) => {
      const host = document.querySelector(`[data-tooltip-host="${chartId}"]`);
      const tip = host?.querySelector('.tooltip-box');
      if (tip) tip.style.display = 'none';
    });
  });
}

    <div class="block-divider">
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:500">Quantidade de desligamentos</p>
      ${allData.map(d => hbar({label:d.mes,value:d.desligamentos,max:maxD,color:d.mes===mesFiltro?"#ef4444":"#f97316",valueLabel:String(d.desligamentos),height:20,labelWidth:28})).join("")}
    </div>
    <div>
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:500">% dos chamados</p>
      ${allData.map(d => { const pct=percDosChamados(d); return hbar({label:d.mes,value:pct*100,max:maxPercChamados,color:d.mes===mesFiltro?"#ef4444":"#f97316",valueLabel:fmtPct(pct),height:20,labelWidth:28}); }).join("")}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────
// TAB: TROCAS
// ─────────────────────────────────────────────────────────────────────────
function tabTrocas(mesFiltro) {
  const allData = mockData.substituicoes;
  const data = mesFiltro==="Todos" ? allData : allData.filter(d=>d.mes===mesFiltro);
  const maxT = Math.max(...allData.map(s=>s.trocas));
  const maxPerc = Math.max(...allData.map(s=>s.perc*100));

  if (mesFiltro === "Todos") {
    return `<div class="card">
      <p style="font-weight:700;font-size:15px;color:var(--text-primary);margin-bottom:18px">Trocas de Equipamentos — Comparativo Mensal</p>
      <div class="block-divider"><p class="block-label">DICICLOS SUBSTITUÍDOS</p>${data.map(d=>hbar({label:d.mes,value:d.trocas,max:maxT,color:"#22c55e",valueLabel:String(d.trocas),height:20,labelWidth:28})).join("")}</div>
      <div><p class="block-label">% SOBRE TOTAL DE CHAMADOS</p>${data.map(d=>hbar({label:d.mes,value:d.perc*100,max:25,color:"#8b5cf6",valueLabel:`${Math.round(d.perc*100)}%`,height:20,labelWidth:28})).join("")}</div>
    </div>
    <div class="kpi-row" style="margin-bottom:0">
      ${data.map(d => kpiCard({label:MES_FULL[d.mes]||d.mes,value:fmt(d.trocas),sub:fmtPct(d.perc)+" dos chamados",color:"#8b5cf6"})).join("")}
    </div>`;
  }

  return `<div class="kpi-row">
    ${data.map(d => kpiCard({label:MES_FULL[d.mes]||d.mes,value:fmt(d.trocas),sub:fmtPct(d.perc)+" dos chamados",color:"#8b5cf6"})).join("")}
  </div>
  <div class="card" style="margin-bottom:0">
    <p class="block-label" style="margin-bottom:16px">HISTÓRICO — TROCAS DE EQUIPAMENTOS (JAN–MAI)</p>
    <div class="block-divider">
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:500">Diciclos substituídos</p>
      ${allData.map(d => hbar({label:d.mes,value:d.trocas,max:maxT,color:d.mes===mesFiltro?"#22c55e":"#8b5cf6",valueLabel:String(d.trocas),height:20,labelWidth:28})).join("")}
    </div>
    <div>
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:500">% dos chamados</p>
      ${allData.map(d => hbar({label:d.mes,value:d.perc*100,max:maxPerc,color:d.mes===mesFiltro?"#22c55e":"#8b5cf6",valueLabel:`${Math.round(d.perc*100)}%`,height:20,labelWidth:28})).join("")}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────
// TAB: CUSTOS
// ─────────────────────────────────────────────────────────────────────────
function costTable(data) {
  return `<table>
    <thead><tr>${["Mês","Faturamento","Descontos","Transportadora","ATS","Total Custos"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
    <tbody>${data.map(row => `<tr>
      <td style="font-weight:600">${MES_FULL[row.mes]||row.mes}</td>
      <td>${fmtR(row.faturamento)}</td>
      <td style="color:#ef4444">${fmtR(row.desconto)}</td>
      <td style="color:#f59e0b">${fmtR(row.transportadora)}</td>
      <td style="color:#8b5cf6">${fmtR(row.ats)}</td>
      <td style="font-weight:600">${fmtR(row.desconto+row.transportadora+row.ats)}</td>
    </tr>`).join("")}</tbody>
  </table>`;
}

function costBlock({ title, icon, color, dataKey, data, justificativa }) {
  const values = data.map(d=>d[dataKey]);
  const maxVal = Math.max(...values);
  const total = values.reduce((a,b)=>a+b,0);
  return `<div class="card">
    <p style="font-size:12px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:0.07em;margin:0 0 16px;display:flex;align-items:center;gap:8px"><span style="font-size:16px">${icon}</span>${esc(title)}</p>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:10px">Valores por mês</p>
    ${data.map(d => hbar({label:d.mes,value:d[dataKey],max:maxVal,color:color,valueLabel:fmtR(d[dataKey]),height:20,labelWidth:28})).join("")}
    <p style="font-size:12px;color:var(--text-muted);margin:14px 0 2px">Total acumulado</p>
    <p style="font-size:16px;font-weight:700;color:${color};margin:0 0 14px">${fmtR(total)}</p>
    ${justificativa?`<div style="border-left:3px solid ${color};padding-left:12px;margin-top:4px"><p style="font-size:12px;color:var(--text-muted);margin:0;line-height:1.6">${esc(justificativa)}</p></div>`:""}
  </div>`;
}

function tabCustos(mesFiltro) {
  const data = mesFiltro==="Todos" ? mockData.custos : mockData.custos.filter(c=>c.mes===mesFiltro);

  if (mesFiltro === "Todos") {
    return costBlock({ title:"Descontos", icon:"🏷️", color:"#ef4444", dataKey:"desconto", data, justificativa:"Em março houve descontos aplicados devido a ausência de veículos e insumos para atendimento rápido, causada por atraso na importação. Em Abril e Maio, os descontos aumentaram em razão do caso Multiplan/Barra Shopping." })
    + costBlock({ title:"Gastos Transportadora", icon:"🚚", color:"#f59e0b", dataKey:"transportadora", data, justificativa:"Em Janeiro, o custo de transportadoras subiu devido aos atrasos de final de ano na logística e período de recesso de alguns ATs. Em Abril, refletiu manobras de postergação de boletos de Fev/Mar, custos da missão Multiplan e envios do Barra Shopping. Em Maio, o aumento decorreu do maior volume de trocas de veículos e de cancelamentos/retiradas." })
    + costBlock({ title:"Gastos com AT", icon:"🔧", color:"#8b5cf6", dataKey:"ats", data })
    + `<div>${sectionTitle("Comparativo Detalhado por Mês")}${costTable(data)}</div>`;
  }

  const totDesc = data.reduce((a,b)=>a+b.desconto,0);
  const totTrans = data.reduce((a,b)=>a+b.transportadora,0);
  const totAts = data.reduce((a,b)=>a+b.ats,0);
  const totFat = data[0]?.faturamento || 0;
  return `<div class="kpi-row">
    ${kpiCard({label:"Faturamento",value:fmtR(totFat),color:"#22c55e"})}
    ${kpiCard({label:"Descontos",value:fmtR(totDesc),color:"#ef4444"})}
    ${kpiCard({label:"Transportadora",value:fmtR(totTrans),color:"#f59e0b"})}
    ${kpiCard({label:"ATS",value:fmtR(totAts),color:"#8b5cf6"})}
  </div>${costTable(data)}`;
}

// ─────────────────────────────────────────────────────────────────────────
// TAB: PONTOS DE ATENÇÃO
// ─────────────────────────────────────────────────────────────────────────
function tabAtencao() {
  const riscos = [
    { nivel:"alto",cor:"#ef4444",bg:"#fef2f2",bord:"#fecaca",titulo:"🔴 Risco Alto",itens:[
      { ref:"SLA em Abril — 56%",impacto:"Quebra de contrato, insatisfação de clientes estratégicos (Multiplan/Barra Shopping). Penalidades financeiras e risco de não renovação.",solucao:"Implementar célula de atendimento dedicada para contas estratégicas; revisar protocolo de escalonamento com resposta em 2h para chamados críticos." },
      { ref:"Custo de Transportadora — Janeiro (R$27.416) e Abril (R$19.294)",impacto:"Erosão de margem operacional em meses já pressionados por descontos e volume de chamados acima da média.",solucao:"Negociar contratos de tabela fixa mensal com transportadoras parceiras; avaliar modal próprio para regiões de alta concentração." },
      { ref:"Desligamentos — Abril e Maio (18 cada)",impacto:"Perda de receita recorrente e possível migração de base para concorrentes.",solucao:"Auditoria de motivo por desligamento; criação de programa de retenção proativo para contratos com mais de 12 meses de campo." },
    ]},
    { nivel:"medio",cor:"#d97706",bg:"#fffbeb",bord:"#fde68a",titulo:"🟡 Risco Médio",itens:[
      { ref:"Pneus como sintoma #1 em todos os meses",impacto:"Alto volume de chamados previsíveis e evitáveis que consomem capacidade operacional.",solucao:"Programa de manutenção preventiva trimestral de pneus por contrato. Meta: redução de 30% em chamados no 2º semestre." },
      { ref:"Alta de chamados em Março e Abril (183 e 213)",impacto:"Pressão sobre equipe de atendimento e risco de atrasos no SLA.",solucao:"Identificar sazonalidade e reforçar equipe preventivamente nos meses de pico (Mar–Abr)." },
      { ref:"Taxa de troca crescente (16% → 20% em Maio)",impacto:"Aumento de custo logístico e possível indicação de deterioração de frota.",solucao:"Mapear equipamentos com maior taxa de troca; avaliar substituição de frota envelhecida." },
    ]},
    { nivel:"baixo",cor:"#16a34a",bg:"#f0fdf4",bord:"#bbf7d0",titulo:"🟢 Risco Baixo — Monitoramento Contínuo",itens:[
      { ref:"Custo ATS equilibrado (~R$13K–R$18K/mês)",impacto:"Custo controlado, mas com leve tendência de alta em Maio.",solucao:"Acompanhar variação; identificar se alta em Maio é pontual ou tendência." },
      { ref:"Descontos zerados em Fevereiro",impacto:"Indica operação sem intercorrências — modelo a ser replicado.",solucao:"Documentar práticas de Fevereiro e aplicar como benchmark operacional." },
    ]},
  ];

  return `${sectionTitle("Matriz de Risco Operacional")}
  ${riscos.map(({cor,bg,bord,titulo,itens}) => `<div style="margin-bottom:24px">
    <p style="font-weight:700;font-size:14px;color:${cor};margin-bottom:12px">${titulo}</p>
    ${itens.map(item => `<div class="risk-box" style="background:${bg};border:1px solid ${bord}">
      <p class="risk-ref" style="color:${cor}">ℹ️ ${esc(item.ref)}</p>
      <p class="risk-text"><strong>Impacto:</strong> ${esc(item.impacto)}</p>
      <p class="risk-text" style="margin:0"><strong>Plano de ação:</strong> ${esc(item.solucao)}</p>
    </div>`).join("")}
  </div>`).join("")}`;
}

// ─────────────────────────────────────────────────────────────────────────
// RENDER PRINCIPAL
// ─────────────────────────────────────────────────────────────────────────
function renderSidebar() {
  return `<div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-box">⚡</div>
      <div><p class="brand-title">BRMOBILITY</p><p class="brand-sub">OPERACIONAL</p></div>
    </div>
    <nav>
      ${NAV.map(n => `<button class="nav-btn ${state.aba===n.id?'active':''}" data-nav="${n.id}">
        <span class="ic">${n.icon}</span><span class="lbl">${n.label}</span>${state.aba===n.id?'<span style="font-size:11px">›</span>':''}
      </button>`).join("")}
    </nav>
    <div class="sidebar-footer">
      <button class="theme-btn" id="themeToggle">
        <span style="display:flex;align-items:center;gap:8px">${state.dark?'☀️':'🌙'} ${state.dark?'Light Mode':'Dark Mode'}</span>
        <div class="toggle-track" style="background:${state.dark?'#4f63f7':'var(--card-border)'}">
          <div class="toggle-dot" style="left:${state.dark?'16px':'3px'}"></div>
        </div>
      </button>
      ${currentUser ? `<div style="font-size:11px;color:var(--text-muted);margin-top:10px;padding:0 2px">Logado como<br><strong style="color:var(--text-primary)">${esc(currentUser.email)}</strong></div>
      <button class="logout-btn" onclick="logout()">🚪 Sair</button>` : ""}
    </div>
  </div>`;
}

function renderHeader() {
  const currentAba = NAV.find(n=>n.id===state.aba);
  return `<div class="header">
    <div>
      <p class="header-title">${currentAba?.label || ''}</p>
      <p class="header-sub">${state.mes==="Todos"?"Jan – Mai 2025 • Visão acumulada":MES_FULL[state.mes]+" 2025"}</p>
    </div>
    <div class="filters">
      ${MESES.map(m => `<button class="filter-btn ${state.mes===m?'active':''}" data-mes="${m}">${m}</button>`).join("")}
    </div>
  </div>`;
}

function renderContent() {
  switch(state.aba) {
    case "visao": return tabVisaoGeral(state.mes);
    case "chamados": return tabChamados(state.mes);
    case "modelos": return tabModelos(state.mes);
    case "sintomas": return tabSintomas(state.mes);
    case "desligamentos": return tabDesligamentos(state.mes);
    case "trocas": return tabTrocas(state.mes);
    case "custos": return tabCustos(state.mes);
    case "atencao": return tabAtencao();
    default: return "";
  }
}

function render() {
  applyTheme();
  const root = document.getElementById('root');
  root.innerHTML = `<div class="app">
    ${renderSidebar()}
    <div class="main">
      ${renderHeader()}
      <div class="content">${renderContent()}</div>
    </div>
  </div>`;
  attachEvents();

  if (state.aba === "visao") {
    wireMiniChartTooltips({
      desconto: { color:"#ef4444", formatValue:fmtR, getValue: idx => mockData.custos[idx].desconto },
      transportadora: { color:"#f59e0b", formatValue:fmtR, getValue: idx => mockData.custos[idx].transportadora },
      ats: { color:"#8b5cf6", formatValue:fmtR, getValue: idx => mockData.custos[idx].ats },
      slaCount: { color:"#22c55e", formatValue: v => `${fmt(v)} chamados`, getValue: idx => mockData.chamados[idx].noSLA },
    });
  }
}

function attachEvents() {
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => { state.aba = btn.getAttribute('data-nav'); render(); });
  });
  document.querySelectorAll('[data-mes]').forEach(btn => {
    btn.addEventListener('click', () => { state.mes = btn.getAttribute('data-mes'); render(); });
  });
  const themeBtn = document.getElementById('themeToggle');
  if (themeBtn) themeBtn.addEventListener('click', () => { state.dark = !state.dark; render(); });
}

render();
</script>
</body>
</html>
