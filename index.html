function getMesesFiltro() {
  const presentes = mockData.chamados.map(c => c.mes);
  const ordenados = ALL_MESES_ORDER.filter(m => presentes.includes(m));
  return ["Todos", ...ordenados];
}

function upsertByMes(arr, mes, obj) {
  const idx = arr.findIndex(x => x.mes === mes);
  if (idx >= 0) arr[idx] = { ...arr[idx], ...obj };
  else {
    arr.push(obj);
    arr.sort((a,b) => ALL_MESES_ORDER.indexOf(a.mes) - ALL_MESES_ORDER.indexOf(b.mes));
  }
}

  return `<select id="${id}">

  console.warn("Firebase não inicializado (verifique firebaseConfig):", e);
}

let currentUser = null;
function isEditor() {
  return currentUser && currentUser.email && currentUser.email.toLowerCase() === ALLOWED_EMAIL;
}

let unsubscribeSnapshot = null;
function startRealtimeSync() {
  if (!db) { render(); return; }
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  unsubscribeSnapshot = db.collection("dashboard").doc("data").onSnapshot(doc => {
    if (doc.exists) {
      const remote = doc.data();
      mockData.chamados = remote.chamados || mockData.chamados;
      mockData.modelos = remote.modelos || mockData.modelos;
      mockData.sintomas = remote.sintomas || mockData.sintomas;
      mockData.desligamentos = remote.desligamentos || mockData.desligamentos;
      mockData.substituicoes = remote.substituicoes || mockData.substituicoes;
      mockData.custos = remote.custos || mockData.custos;
    } else if (isEditor()) {
      db.collection("dashboard").doc("data").set(mockData).catch(e => console.error(e));
    }
    render();
  }, err => {
    console.error("Erro de sincronização com Firestore:", err);
    render();
  });
}

function persist() {
  if (!db) { console.warn("Firestore não disponível."); return; }
  if (!isEditor()) { console.warn("Sem permissão para salvar."); return; }
  db.collection("dashboard").doc("data").set(mockData)
    .then(() => console.info("Dados salvos no Firestore."))
    .catch(e => console.error("Erro ao salvar:", e));
}

function commitAndSave() {
  render();
  persist();
}

    document.getElementById('root').innerHTML = `<div class="login-page">

        </div>
      </div>
    </div>`;
    return;
  }
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      startRealtimeSync();
    } else {
      currentUser = null;
      if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
      renderLoginGate();
    }
  });
}

        slaIn=document.getElementById('f-ch-nosla'), paIn=document.getElementById('f-ch-percatend'), psIn=document.getElementById('f-ch-percsla');
  function suggest() {
    const ch=parseFloat(chIn.value), at=parseFloat(atIn.value), sl=parseFloat(slaIn.value);
    if (ch>0) {
      if (!isNaN(at) && !paIn.dataset.touched) paIn.value = ((at/ch)*100).toFixed(1);

  [chIn,atIn,slaIn].forEach(el => el.addEventListener('input', suggest));
  [paIn,psIn].forEach(el => el.addEventListener('input', () => { el.dataset.touched = "1"; }));
