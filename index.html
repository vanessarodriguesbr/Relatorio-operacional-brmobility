<!DOCTYPE html>

<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: 'Inter', -apple-system, sans-serif; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius:3px; }
  .app { display:flex; height:100vh; background:var(--bg); }
  .sidebar { width:240px; background:var(--sidebar-bg); border-right:1px solid var(--card-border); display:flex; flex-direction:column; flex-shrink:0; }
  .sidebar-header { padding:20px 18px 16px; border-bottom:1px solid var(--card-border); display:flex; align-items:center; gap:10px; }
  .logo-box { width:32px; height:32px; border-radius:8px; background:#4f63f7; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; flex-shrink:0; }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .header { background:var(--header-bg); border-bottom:1px solid var(--card-border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; flex-wrap:wrap; gap:10px; }

  .content { flex:1; overflow-y:auto; padding:24px 28px; }
  .card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:14px; padding:20px 24px; margin-bottom:24px; }
  .section-title { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin:0 0 14px; }
  .block-label { font-size:11px; font-weight:700; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; }
  .block-divider { border-bottom:1px solid var(--card-border); padding-bottom:20px; margin-bottom:20px; }
  .hbar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .hbar-label { font-size:12px; color:var(--text-muted); font-weight:600; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hbar-track { flex:1; background:var(--bar-bg); border-radius:20px; overflow:hidden; position:relative; }

  .hbar-value { width:46px; font-size:12px; color:var(--text-primary); font-weight:600; text-align:right; flex-shrink:0; }
  .kpi-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px; }

  .login-field label { display:block; font-size:12px; color:#3d6b6e; margin-bottom:6px; font-weight:600; }
  .login-field input { width:100%; padding:11px 12px; border-radius:8px; border:1px solid #d6e0e0; background:#f8fafa; color:#0c3b3e; font-size:13px; outline:none; }

  .logout-btn { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:8px; border:1px solid var(--card-border); background:var(--filter-bg); cursor:pointer; color:var(--text-primary); font-size:12px; width:100%; margin-top:8px; }
</style>

const NAV = [
  { id:"visao", label:"Visão Geral", icon:"🏠" },

// ─────────────────────────────────────────────────────────────────────────
// HELPERS (LÓGICA CORRIGIDA: APENAS MOSTRA MESES QUE POSSUEM DADOS REAIS)
// ─────────────────────────────────────────────────────────────────────────
const fmt = v => (v==null||isNaN(v)?"-":v.toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0}));
const fmtR = v => (v==null||isNaN(v)?"-":`R$ ${v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`);
const fmtPct = v => (v==null||isNaN(v)?"-":`${(v*100).toFixed(1)}%`);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function getMesesFiltro() {
  const setMeses = new Set();
  
  mockData.chamados.forEach(c => { if(c.chamados > 0 || c.atendidos > 0) setMeses.add(c.mes); });
  mockData.custos.forEach(c => { if((c.faturamento || c.desconto || c.transportadora || c.ats) || c.obsDesconto || c.obsTransportadora) setMeses.add(c.mes); });
  mockData.desligamentos.forEach(d => { if(d.desligamentos > 0) setMeses.add(d.mes); });
  mockData.substituicoes.forEach(s => { if(s.trocas > 0) setMeses.add(s.mes); });
  
  Object.keys(mockData.modelos).forEach(m => { if(mockData.modelos[m] && mockData.modelos[m].length > 0) setMeses.add(m); });
  Object.keys(mockData.sintomas).forEach(m => { if(mockData.sintomas[m] && mockData.sintomas[m].length > 0) setMeses.add(m); });
  
  const ordenados = ALL_MESES_ORDER.filter(m => setMeses.has(m));
  return ["Todos", ...ordenados];
}

function normalizarBancoDeDados() {
  const mesesComDados = getMesesFiltro().filter(m => m !== "Todos");
  
  mesesComDados.forEach(m => {
    if (!mockData.chamados.some(c => c.mes === m)) mockData.chamados.push({ mes: m, chamados: 0, atendidos: 0, percAtendidos: 0, noSLA: 0, percSLA: 0 });
    if (!mockData.custos.some(c => c.mes === m)) mockData.custos.push({ mes: m, chamados: 0, faturamento: 0, desconto: 0, transportadora: 0, ats: 0, obsDesconto:"", obsTransportadora:"", obsAts:"" });
    if (!mockData.desligamentos.some(d => d.mes === m)) mockData.desligamentos.push({ mes: m, desligamentos: 0, perc: 0 });
    if (!mockData.substituicoes.some(s => s.mes === m)) mockData.substituicoes.push({ mes: m, trocas: 0, perc: 0 });
    if (!mockData.modelos[m]) mockData.modelos[m] = [];
    if (!mockData.sintomas[m]) mockData.sintomas[m] = [];
  });
  
  const sortFn = (a, b) => ALL_MESES_ORDER.indexOf(a.mes) - ALL_MESES_ORDER.indexOf(b.mes);
  mockData.chamados.sort(sortFn);
  mockData.custos.sort(sortFn);
  mockData.desligamentos.sort(sortFn);
  mockData.substituicoes.sort(sortFn);
}

function upsertByMes(arr, mes, obj) {
  const idx = arr.findIndex(x => x.mes === mes);
  if (idx >= 0) arr[idx] = { ...arr[idx], ...obj };
  else arr.push(obj);
  normalizarBancoDeDados();
}

let unsubscribeSnapshot = null;
function startRealtimeSync() {
  if (!db) { normalizarBancoDeDados(); render(); return; }
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  unsubscribeSnapshot = db.collection("dashboard").doc("data").onSnapshot(doc => {
    if (doc.exists) {
      const remote = doc.data();
      mockData.chamados = remote.chamados || mockData.chamados;
      mockData.modelos = remote.modelos || mockData.modelos;
      mockData.sintomas = remote.sintomas || mockData.sintomas;
      mockData.desligamentos = remote.desligamentos || mockData.desligamentos;
      mockData.substituicoes = remote.substituicoes || mockData.substituicoes;
      mockData.custos = remote.custos || mockData.custos;
    } else if (isEditor()) {
      db.collection("dashboard").doc("data").set(mockData).catch(e => console.error(e));
    }
    normalizarBancoDeDados();
    render();
  }, err => {
    console.error("Erro de sincronização:", err);
    normalizarBancoDeDados();
    render();
  });
}

function persist() {
  if (!db) return;
  if (!isEditor()) return;
  db.collection("dashboard").doc("data").set(mockData).catch(e => console.error(e));
}

function commitAndSave() {
  normalizarBancoDeDados();
  render();
  persist();
}

function setupAuthGate() {
  if (!auth) {
    normalizarBancoDeDados();
    render();
    return;
  }
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      // Validação do domínio corporativo ou admin fixo
      if (isViewer()) {
        startRealtimeSync();
      } else {
        auth.signOut();
        currentUser = null;
        if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
        renderLoginForm("Acesso negado. Domínio de e-mail não autorizado.");
      }
    } else {
      currentUser = null;
      if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
      renderLoginGate();
    }
  });
}

        <div class="hbar-dot"></div>
      </div>
    </div>
    <span class="hbar-value">${esc(valueLabel)}</span>
  </div>`;
}

    if (!mes) { alert('Selecione o mês.'); return; }
    const chamadosDoMes = (mockData.chamados.find(c=>c.mes===mes)?.chamados) || 0;
    
    upsertByMes(mockData.custos, mes, {

// ─────────────────────────────────────────────────────────────────────────
// MINI AREA CHART (SVG COMPARTILHADO)
// ─────────────────────────────────────────────────────────────────────────
function miniAreaCard({ title, icon, color, dataKey, idSuffix }) {
  const mesesValidos = getMesesFiltro().filter(m => m !== "Todos");
  const data = mesesValidos.map(m => {
    const cObj = mockData.chamados.find(c => c.mes === m) || { noSLA: 0 };
    const custoObj = mockData.custos.find(cust => cust.mes === m);
    return {
      mes: m,
      val: custoObj && custoObj[dataKey] !== undefined ? custoObj[dataKey] : (cObj[dataKey] || 0)
    };
  });
  const W = 280, H = 150, PAD = 24;
  const maxV = Math.max(...data.map(d=>d.val), 1);
  const minV = 0;
  const stepX = data.length>1 ? (W - PAD*1.2) / (data.length - 1) : 0;
  const pts = data.map((d,i) => {
    const x = PAD*0.6 + i*stepX;
    const y = H - 20 - ((d.val - minV)/(maxV-minV || 1)) * (H - 40);
    return { x, y, ...d };
  });
  const linePath = pts.map((p,i) => (i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
  const areaPath = pts.length ? `${linePath} L${pts[pts.length-1].x},${H-20} L${pts[0].x},${H-20} Z` : "";
  const gradId = `grad-${idSuffix}`;

  const circles = pts.map((p,i) => `<circle data-idx="${i}" data-chart="${idSuffix}" cx="${p.x}" cy="${p.y}" r="5" fill="${color}" fill-opacity="0" stroke="none" style="cursor:pointer"></circle>
    <circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${color}"></circle>`).join("");

  const xLabels = pts.map(p => `<text x="${p.x}" y="${H-4}" font-size="11" fill="var(--text-muted)" text-anchor="middle">${p.mes}</text>`).join("");

  return `<div class="mini-card" data-tooltip-host="${idSuffix}" style="position:relative">
    <p class="mini-title" style="color:${color}"><span style="font-size:14px">${icon}</span>${esc(title)}</p>
    <div class="mini-chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" style="overflow:visible">
        <defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%" stop-color="${color}" stop-opacity="0.3"/>
            <stop offset="95%" stop-color="${color}" stop-opacity="0.03"/>
          </linearGradient>
        </defs>
        ${[0,1,2,3].map(i => `<line x1="${PAD*0.6}" y1="${20+i*(H-40)/3}" x2="${W-PAD*0.6}" y2="${20+i*(H-40)/3}" stroke="var(--chart-grid)" stroke-dasharray="3 3"/>`).join("")}
        <path d="${areaPath}" fill="url(#${gradId})"></path>
        <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2"></path>
        ${circles}
        ${xLabels}
      </svg>
    </div>
  </div>`;
}

function wireMiniChartTooltips(formatValueFns) {
  const mesesValidos = getMesesFiltro().filter(m => m !== "Todos");
  document.querySelectorAll('circle[data-chart]').forEach(circle => {
    const chartId = circle.getAttribute('data-chart');
    const idx = parseInt(circle.getAttribute('data-idx'),10);
    circle.addEventListener('mouseenter', () => {
      const host = document.querySelector(`[data-tooltip-host="${chartId}"]`);
      if (!host) return;
      const mesKey = mesesValidos[idx];
      if (!mesKey) return;
      const dataKeyInfo = formatValueFns[chartId];
      const val = dataKeyInfo.getValue(mesKey);
      const sintoma = mockData.sintomas[mesKey]?.[0]?.sintoma ?? "-";
      const modelo = mockData.modelos[mesKey]?.[0]?.modelo ?? "-";
      const chamadosV = mockData.chamados.find(c=>c.mes===mesKey)?.chamados || 0;
      const trocasV = mockData.substituicoes.find(t=>t.mes===mesKey)?.trocas ?? "-";
      let tip = host.querySelector('.tooltip-box');
      if (!tip) { tip = document.createElement('div'); tip.className = 'tooltip-box'; host.appendChild(tip); }
      tip.innerHTML = `<p style="font-weight:700;margin-bottom:4px">${mesKey}</p>
        <p style="color:${dataKeyInfo.color}">${dataKeyInfo.formatValue(val)}</p>
        <p style="color:var(--text-muted);font-size:11px">⚡ Sintoma: <b>${esc(sintoma)}</b></p>
        <p style="color:var(--text-muted);font-size:11px">🚲 Modelo: <b>${esc(modelo)}</b></p>
        <p style="color:var(--text-muted);font-size:11px">Chamados: <b>${chamadosV}</b></p>
        <p style="color:var(--text-muted);font-size:11px">Trocas: <b>${trocasV}</b></p>`;
      tip.style.display = 'block'; tip.style.left = '10px'; tip.style.top = '36px';
    });
    circle.addEventListener('mouseleave', () => {
      const host = document.querySelector(`[data-tooltip-host="${chartId}"]`);
      const tip = host?.querySelector('.tooltip-box');
      if (tip) tip.style.display = 'none';
    });
  });
}

      <div class="block-divider"><p class="block-label">DESLIGAMENTOS POR MÊS</p>${data.map(d=>hbar({label:d.mes,value:d.desligamentos,max:maxD,color:"#ef4444",valueLabel:String(d.desligamentos),height:20,labelWidth:28})).join("")}</div>
      <p class="block-label">% DOS CHAMADOS</p>
      ${data.map(d => { const pct=percDosChamados(d); return hbar({label:d.mes,value:pct*100,max:maxPercChamados,color:"#f97316",valueLabel:fmtPct(pct),height:20,labelWidth:28}); }).join("")}
    </div>
    <div class="kpi-row" style="margin-bottom:0">
      ${data.map(d => kpiCard({label:MES_FULL[d.mes]||d.mes,value:fmt(d.desligamentos),sub:`${fmtPct(percDosChamados(d))} dos chamados`,color:"#ef4444"})).join("")}
    </div>`;
  }

  const d = data[0] || { desligamentos:0 };
  return formHtml + `<div class="kpi-row">
    ${kpiCard({label:MES_FULL[mesFiltro]||mesFiltro,value:fmt(d.desligamentos),sub:`${fmtPct(percDosChamados(d || {mes:mesFiltro}))} dos chamados`,color:"#ef4444"})}
  </div>
  <div class="card" style="margin-bottom:0">
    <p class="block-label" style="margin-bottom:16px">HISTÓRICO — DESLIGAMENTOS</p>
    <div class="block-divider">
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:500">Quantidade de desligamentos</p>
      ${allData.map(d => hbar({label:d.mes,value:d.desligamentos,max:maxD,color:d.mes===mesFiltro?"#ef4444":"#f97316",valueLabel:String(d.desligamentos),height:20,labelWidth:28})).join("")}
    </div>
    <div>
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:500">% dos chamados</p>
      ${allData.map(d => { const pct=percDosChamados(d); return hbar({label:d.mes,value:pct*100,max:maxPercChamados,color:d.mes===mesFiltro?"#ef4444":"#f97316",valueLabel:fmtPct(pct),height:20,labelWidth:28}); }).join("")}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────
// TAB: TROCAS
// ─────────────────────────────────────────────────────────────────────────
function tabTrocas(mesFiltro) {
  const mesesValidos = getMesesFiltro().filter(m => m !== "Todos");
  const allData = mockData.substituicoes.filter(s=>mesesValidos.includes(s.mes));
  const data = mesFiltro==="Todos" ? allData : allData.filter(d=>d.mes===mesFiltro);
  const maxT = Math.max(...mockData.substituicoes.map(s=>s.trocas), 1);
  const maxPerc = Math.max(...mockData.substituicoes.map(s=>s.perc*100), 1);
  const formHtml = isEditor() ? formTrocas() : "";

  if (mesFiltro === "Todos") {
    return formHtml + `<div class="card">
      <p style="font-weight:700;font-size:15px;color:var(--text-primary);margin-bottom:18px">Trocas de Equipamentos — Comparativo Mensal</p>
      <div class="block-divider"><p class="block-label">DICICLOS SUBSTITUÍDOS</p>${data.map(d=>hbar({label:d.mes,value:d.trocas,max:maxT,color:"#22c55e",valueLabel:String(d.trocas),height:20,labelWidth:28})).join("")}</div>
      <div><p class="block-label">% SOBRE TOTAL DE CHAMADOS</p>${data.map(d=>hbar({label:d.mes,value:d.perc*100,max:Math.max(maxPerc,25),color:"#8b5cf6",valueLabel:`${Math.round(d.perc*100)}%`,height:20,labelWidth:28})).join("")}</div>
    </div>
    <div class="kpi-row" style="margin-bottom:0">
      ${data.map(d => kpiCard({label:MES_FULL[d.mes]||d.mes,value:fmt(d.trocas),sub:fmtPct(d.perc)+" dos chamados",color:"#8b5cf6"})).join("")}
    </div>`;
  }

  const d = data[0] || { trocas:0, perc:0 };
  return formHtml + `<div class="kpi-row">
    ${kpiCard({label:MES_FULL[mesFiltro]||mesFiltro,value:fmt(d.trocas),sub:fmtPct(d.perc)+" dos chamados",color:"#8b5cf6"})}
  </div>
  <div class="card" style="margin-bottom:0">
    <p class="block-label" style="margin-bottom:16px">HISTÓRICO — TROCAS DE EQUIPAMENTOS</p>
    <div class="block-divider">
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:500">Diciclos substituídos</p>
      ${allData.map(d => hbar({label:d.mes,value:d.trocas,max:maxT,color:d.mes===mesFiltro?"#22c55e":"#8b5cf6",valueLabel:String(d.trocas),height:20,labelWidth:28})).join("")}
    </div>
    <div>
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:500">% dos chamados</p>
      ${allData.map(d => hbar({label:d.mes,value:d.perc*100,max:maxPerc,color:d.mes===mesFiltro?"#22c55e":"#8b5cf6",valueLabel:`${Math.round(d.perc*100)}%`,height:20,labelWidth:28})).join("")}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────
// TAB: CUSTOS
// ─────────────────────────────────────────────────────────────────────────
function costTable(data) {
  return `<table>
    <thead><tr>${["Mês","Faturamento","Descontos","Transportadora","ATS","Total Custos"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
    <tbody>${data.map(row => `<tr>
      <td style="font-weight:600">${MES_FULL[row.mes]||row.mes}</td>
      <td>${fmtR(row.faturamento)}</td>
      <td style="color:#ef4444">${fmtR(row.desconto)}</td>
      <td style="color:#f59e0b">${fmtR(row.transportadora)}</td>
      <td style="color:#8b5cf6">${fmtR(row.ats)}</td>
      <td style="font-weight:600">${fmtR((row.desconto||0)+(row.transportadora||0)+(row.ats||0))}</td>
    </tr>`).join("")}</tbody>
  </table>`;
}
function costBlock({ title, icon, color, dataKey, data, obsKey }) {
  const values = data.map(d=>d[dataKey] || 0);
  const maxVal = Math.max(...values, 1);
  const total = values.reduce((a,b)=>a+b,0);
  
  const obsHtml = data.map(d => {
    if (d[obsKey]) {
      return `<div style="border-left:3px solid ${color};padding-left:12px;margin-top:10px;margin-bottom:10px;"><p style="font-size:12px;color:var(--text-primary);margin:0;line-height:1.6"><b>${d.mes}:</b> ${esc(d[obsKey])}</p></div>`;
    }
    return "";
  }).join("");

  return `<div class="card">
    <p style="font-size:12px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:0.07em;margin:0 0 16px;display:flex;align-items:center;gap:8px"><span style="font-size:16px">${icon}</span>${esc(title)}</p>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:10px">Valores por mês</p>
    ${data.map(d => hbar({label:d.mes,value:d[dataKey] || 0,max:maxVal,color:color,valueLabel:fmtR(d[dataKey] || 0),height:20,labelWidth:28})).join("")}
    <p style="font-size:12px;color:var(--text-muted);margin:14px 0 2px">Total acumulado</p>
    <p style="font-size:16px;font-weight:700;color:${color};margin:0 0 14px">${fmtR(total)}</p>
    ${obsHtml ? `<p style="font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:600;">Justificativas e Observações:</p>${obsHtml}` : ""}
  </div>`;
}
function tabCustos(mesFiltro) {
  const mesesValidos = getMesesFiltro().filter(m => m !== "Todos");
  const data = mesFiltro==="Todos" ? mockData.custos.filter(c=>mesesValidos.includes(c.mes)) : mockData.custos.filter(c=>c.mes===mesFiltro);
  const formHtml = isEditor() ? formCustos() : "";

  if (mesFiltro === "Todos") {
    return formHtml
    + costBlock({ title:"Descontos", icon:"🏷️", color:"#ef4444", dataKey:"desconto", data, obsKey:"obsDesconto" })
    + costBlock({ title:"Gastos Transportadora", icon:"🚚", color:"#f59e0b", dataKey:"transportadora", data, obsKey:"obsTransportadora" })
    + costBlock({ title:"Gastos com AT", icon:"🔧", color:"#8b5cf6", dataKey:"ats", data, obsKey:"obsAts" })
    + `<div>${sectionTitle("Comparativo Detalhado por Mês")}${costTable(data)}</div>`;
  }

  const totDesc = data.reduce((a,b)=>a+(b.desconto||0),0);
  const totTrans = data.reduce((a,b)=>a+(b.transportadora||0),0);
  const totAts = data.reduce((a,b)=>a+(b.ats||0),0);
  const totFat = data[0]?.faturamento || 0;
  
  let singHtml = formHtml + `<div class="kpi-row">
    ${kpiCard({label:"Faturamento",value:fmtR(totFat),color:"#22c55e"})}
    ${kpiCard({label:"Descontos",value:fmtR(totDesc),color:"#ef4444"})}
    ${kpiCard({label:"Transportadora",value:fmtR(totTrans),color:"#f59e0b"})}
    ${kpiCard({label:"ATS",value:fmtR(totAts),color:"#8b5cf6"})}
  </div>`;

  const item = data[0];
  if(item && (item.obsDesconto || item.obsTransportadora || item.obsAts)) {
    singHtml += `<div class="card">${sectionTitle("Justificativas do Mês")}`;
    if(item.obsDesconto) singHtml += `<p style="font-size:12px;margin-bottom:8px"><b>🏷️ Descontos:</b> ${esc(item.obsDesconto)}</p>`;
    if(item.obsTransportadora) singHtml += `<p style="font-size:12px;margin-bottom:8px"><b>🚚 Transportadora:</b> ${esc(item.obsTransportadora)}</p>`;
    if(item.obsAts) singHtml += `<p style="font-size:12px;"><b>🔧 ATS:</b> ${esc(item.obsAts)}</p>`;
    singHtml += `</div>`;
  }

  return singHtml + `<div>${costTable(data)}</div>`;
}

// ─────────────────────────────────────────────────────────────────────────
// TAB: PONTOS DE ATENÇÃO (REATIVO DINÂMICO REAL)
// ─────────────────────────────────────────────────────────────────────────
function dynamicRiskSummary() {
  const mesesValidos = getMesesFiltro().filter(m => m !== "Todos");
  if (!mesesValidos.length) return "";
  
  const lastMes = mesesValidos[mesesValidos.length-1];
  const last = mockData.chamados.find(c => c.mes === lastMes) || { mes: lastMes, chamados: 0, atendidos: 0, percAtendidos: 0, noSLA: 0, percSLA: 0 };
  const desl = mockData.desligamentos.find(d=>d.mes===last.mes);
  const troc = mockData.substituicoes.find(d=>d.mes===last.mes);
  
  const items = [];
  if (last.percSLA && last.percSLA < 0.7) items.push(`SLA de ${MES_FULL[last.mes] || last.mes} está em ${(last.percSLA*100).toFixed(0)}% — abaixo da meta de 80%. Atenção imediata recomendada.`);
  else if (last.percSLA && last.percSLA >= 0.85) items.push(`SLA de ${MES_FULL[last.mes] || last.mes} está saudável, em ${(last.percSLA*100).toFixed(0)}%.`);
  if (desl && desl.perc > 0.1) items.push(`Desligamentos de ${MES_FULL[last.mes] || last.mes} representam ${(desl.perc*100).toFixed(0)}% dos chamados — acima do padrão histórico.`);
  if (troc && troc.perc > 0.18) items.push(`Trocas de equipamentos em ${MES_FULL[last.mes] || last.mes} subiram para ${(troc.perc*100).toFixed(0)}% dos chamados.`);
  const topSintoma = mockData.sintomas[last.mes]?.[0];
  if (topSintoma) items.push(`Principal sintoma de ${MES_FULL[last.mes] || last.mes}: ${topSintoma.sintoma} (${topSintoma.perc}% dos chamados do mês).`);
  
  if (!items.length) return "";
  return `<div class="card" style="border:2px solid #4f63f7;margin-bottom:24px">
    <p class="block-label" style="margin-bottom:10px">🆕 ATUALIZAÇÃO AUTOMÁTICA — ${(MES_FULL[last.mes]||last.mes).toUpperCase()}</p>
    ${items.map(t=>`<p class="diag-text" style="margin-bottom:6px">• ${esc(t)}</p>`).join("")}
  </div>`;
}
function tabAtencao() {
  const mesesValidos = getMesesFiltro().filter(m => m !== "Todos");
  const lastMes = mesesValidos[mesesValidos.length-1] || "Jan";
  
  const last = mockData.chamados.find(c => c.mes === lastMes) || { mes: lastMes, percSLA: 0.8, chamados:0 };
  const desl = mockData.desligamentos.find(d=>d.mes===last.mes) || { desligamentos: 0, perc: 0 };
  const troc = mockData.substituicoes.find(d=>d.mes===last.mes) || { trocas: 0, perc: 0 };
  const cost = mockData.custos.find(d=>d.mes===last.mes) || { desconto: 0, transportadora: 0, ats: 0 };

  const riscos = [
    { cor:"#ef4444",bg:"#fef2f2",bord:"#fecaca",titulo:"🔴 Risco Alto",itens:[
      { ref:`SLA Operacional em ${MES_FULL[last.mes] || last.mes} — ${fmtPct(last.percSLA)}`,impacto:"Quebra de contrato, insatisfação de clientes estratégicos e aplicação de penalidades financeiras.",solucao:"Acompanhar os gargalos de atendimento no mês e estruturar células de prioridade imediata." },
      { ref:`Custo de Transportadora em ${MES_FULL[last.mes] || last.mes} — ${fmtR(cost.transportadora)}`,impacto:"Pressão sobre a margem operacional direta decorrente de fretes urgentes ou reenvios logísticos.",solucao:"Negociar contratos de tabela fixa com transportadoras de rota frequente." },
      { ref:`Desligamentos operacionais — Mês de ${MES_FULL[last.mes] || last.mes} (${desl.desligamentos} ações)`,impacto:"Redução receita reuniões recorrente e enfraquecimento da presença de mercado.",solucao:"Realizar auditoria de motivos por desligamento estruturando retenção focada." },
    ]},
    { cor:"#d97706",bg:"#fffbeb",bord:"#fde68a",titulo:"🟡 Risco Médio",itens:[
      { ref:`Sintoma Recorrente em ${MES_FULL[last.mes] || last.mes} (${esc(mockData.sintomas[last.mes]?.[0]?.sintoma || "Pneus")})`,impacto:"Alto volume de chamados previsíveis ocupando capacidade da assistência interna.",solucao:"Reforçar inspeção preventiva cíclica para mitigar reincidências mecânicas." },
      { ref:`Taxa de Troca de Frota — ${fmtPct(troc.perc)} das ações`,impacto:"Custos logísticos adicionais associados à movimentação de equipamentos de substituição.",solucao:"Mapear equipamentos com maior taxa de substituição direta em campo." },
    ]},
    { cor:"#16a34a",bg:"#f0fdf4",bord:"#bbf7d0",titulo:"🟢 Risco Baixo — Monitoramento Contínuo",itens:[
      { ref:`Faturamento e Descontos apurados (${fmtR(cost.desconto)} em descontos)`,impacto:"Impacto residual controlado nas receitas, exigindo manutenção do benchmark.",solucao:"Documentar práticas de períodos de baixa ocorrência de descontos corporativos." },
    ]},
  ];

  return dynamicRiskSummary() + sectionTitle("Matriz de Risco Operacional (Base Dinâmica)")
  + riscos.map(({cor,bg,bord,titulo,itens}) => `<div style="margin-bottom:24px">
    <p style="font-weight:700;font-size:14px;color:${cor};margin-bottom:12px">${titulo}</p>
    ${itens.map(item => `<div class="risk-box" style="background:${bg};border:1px solid ${bord}">
      <p class="risk-ref" style="color:${cor}">ℹ️ ${esc(item.ref)}</p>
      <p class="risk-text"><strong>Impacto:</strong> ${esc(item.impacto)}</p>
      <p class="risk-text" style="margin:0"><strong>Plano de ação:</strong> ${esc(item.solucao)}</p>
    </div>`).join("")}
  </div>`).join("");
}

// ─────────────────────────────────────────────────────────────────────────
// RENDER PRINCIPAL
// ─────────────────────────────────────────────────────────────────────────
function renderSidebar() {
  return `<div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-box">⚡</div>
      <div><p class="brand-title">BRMOBILITY</p><p class="brand-sub">OPERACIONAL</p></div>
    </div>
    <nav>
      ${NAV.map(n => `<button class="nav-btn ${state.aba===n.id?'active':''}" data-nav="${n.id}">
        <span class="ic">${n.icon}</span><span class="lbl">${n.label}</span>${state.aba===n.id?'<span style="font-size:11px">›</span>':''}
      </button>`).join("")}
    </nav>
    <div class="sidebar-footer">
      <button class="theme-btn" id="themeToggle">
        <span style="display:flex;align-items:center;gap:8px">${state.dark?'☀️':'🌙'} ${state.dark?'Light Mode':'Dark Mode'}</span>
        <div class="toggle-track" style="background:${state.dark?'#4f63f7':'var(--card-border)'}">
          <div class="toggle-dot" style="left:${state.dark?'16px':'3px'}"></div>
        </div>
      </button>
      ${currentUser ? `<div style="font-size:11px;color:var(--text-muted);margin-top:10px;padding:0 2px">Logado como<br><strong style="color:var(--text-primary)">${esc(currentUser.email)}</strong>${isEditor()?'<br><span style="color:#22c55e">✓ Permissão de edição</span>':'<br><span style="color:#f97316">Somente visualização</span>'}</div>
      <button class="logout-btn" onclick="logout()">🚪 Sair</button>` : ""}
    </div>
  </div>`;
}
function renderHeader() {
  const currentAba = NAV.find(n=>n.id===state.aba);
  const meses = getMesesFiltro();
  return `<div class="header">
    <div>
      <p class="header-title">${currentAba?.label || ''}</p>
      <p class="header-sub">${state.mes==="Todos"?"Visão acumulada": (MES_FULL[state.mes] || state.mes)}</p>
    </div>
    <div class="filters">
      ${meses.map(m => `<button class="filter-btn ${state.mes===m?'active':''}" data-mes="${m}">${m}</button>`).join("")}
    </div>
  </div>`;
}
function renderContent() {
  switch(state.aba) {
    case "visao": return tabVisaoGeral(state.mes);
    case "chamados": return tabChamados(state.mes);
    case "modelos": return tabModelos(state.mes);
    case "sintomas": return tabSintomas(state.mes);
    case "desligamentos": return tabDesligamentos(state.mes);
    case "trocas": return tabTrocas(state.mes);
    case "custos": return tabCustos(state.mes);
    case "atencao": return tabAtencao();
    default: return "";
  }
}
function render() {
  applyTheme();
  const root = document.getElementById('root');
  if (!getMesesFiltro().includes(state.mes)) state.mes = "Todos";
  root.innerHTML = `<div class="app">
    ${renderSidebar()}
    <div class="main">
      ${renderHeader()}
      <div class="content">${renderContent()}</div>
    </div>
  </div>`;
  attachEvents();
  attachTabFormEvents();

  if (state.aba === "visao" && state.mes === "Todos") {
    wireMiniChartTooltips({
      desconto: { color:"#ef4444", formatValue:fmtR, getValue: mKey => mockData.custos.find(c=>c.mes===mKey)?.desconto || 0 },
      transportadora: { color:"#f59e0b", formatValue:fmtR, getValue: mKey => mockData.custos.find(c=>c.mes===mKey)?.transportadora || 0 },
      ats: { color:"#8b5cf6", formatValue:fmtR, getValue: mKey => mockData.custos.find(c=>c.mes===mKey)?.ats || 0 },
      slaCount: { color:"#22c55e", formatValue: v => `${fmt(v)} chamados`, getValue: mKey => mockData.chamados.find(c=>c.mes===mKey)?.noSLA || 0 },
    });
  }
}
function applyTheme() {
  const dark = state.dark;
  const theme = dark ? {
    "--bg":"#0f1117","--sidebar-bg":"#1a1d27","--card-bg":"#1e2130","--card-border":"#2e3250",
    "--text-primary":"#f1f5f9","--text-muted":"#8890aa","--chart-grid":"#2e3250","--bar-bg":"#2e3250",
    "--tt-bg":"#1e2130","--tt-border":"#2e3250","--tt-text":"#f1f5f9",
    "--header-bg":"#1a1d27","--nav-hover":"#252a3a","--nav-active":"#252a3a","--filter-bg":"#1e2130",
  } : {
    "--bg":"#f8f9fc","--sidebar-bg":"#ffffff","--card-bg":"#ffffff","--card-border":"#e8eaf2",
    "--text-primary":"#1a1d2e","--text-muted":"#6b7280","--chart-grid":"#f1f3f9","--bar-bg":"#f1f3f9",
    "--tt-bg":"#ffffff","--tt-border":"#e8eaf2","--tt-text":"#1a1d2e",
    "--header-bg":"#ffffff","--nav-hover":"#f0f2fc","--nav-active":"#eef0fc","--filter-bg":"#f0f2fc",
  };
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v]) => root.style.setProperty(k,v));
}
function attachEvents() {
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => { state.aba = btn.getAttribute('data-nav'); render(); });
  });
  document.querySelectorAll('[data-mes]').forEach(btn => {
    btn.addEventListener('click', () => { state.mes = btn.getAttribute('data-mes'); render(); });
  });
  const themeBtn = document.getElementById('themeToggle');
  if (themeBtn) themeBtn.addEventListener('click', () => { state.dark = !state.dark; render(); });
}

setupAuthGate();
</script>
</body>
</html>
